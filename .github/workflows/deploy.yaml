name: Deploy to GitHub Pages

# 触发条件：当 main 分支有 push 操作时触发
on:
  push:
    branches:
      - main

# 工作流权限设置
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 2. 设置 Bun 环境
      - name: Setup Bun 🍞
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest # 使用最新版的 bun

      # 3. 安装依赖
      # 使用 --frozen-lockfile 可以确保使用 lock 文件中的确切依赖版本，加快安装速度
      - name: Install dependencies 📦
        run: bun install --frozen-lockfile

      # 4. 构建 Docusaurus 网站
      - name: Build Docusaurus site 🔨
        run: bun run build

      # 5. 配置 GitHub Pages
      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v5
      
      # 6. 上传构建产物
      - name: Upload artifact ⬆️
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build # Docusaurus 构建输出的默认目录

      # 7. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4